# =============================================================================
# RELEASE STAGE
# =============================================================================

# Upload artifacts to GitLab Package Registry for auto-updates
publish:packages:
  stage: release
  needs:
    - job: build:linux
      artifacts: true
    - job: build:windows
      artifacts: true
  script:
    - |
      # Get version from tag
      VERSION=${CI_COMMIT_TAG#v}

      echo "Publishing version ${VERSION} to package registry..."

      # Upload Linux DEB
      for file in out/make/deb/x64/*.deb; do
        if [ -f "$file" ]; then
          echo "Uploading $file..."
          curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
               --upload-file "$file" \
               "${PACKAGE_REGISTRY_URL}/releases/${VERSION}/$(basename $file)"
        fi
      done

      # Upload Linux RPM
      for file in out/make/rpm/x64/*.rpm; do
        if [ -f "$file" ]; then
          echo "Uploading $file..."
          curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
               --upload-file "$file" \
               "${PACKAGE_REGISTRY_URL}/releases/${VERSION}/$(basename $file)"
        fi
      done

      # Upload Windows installer
      for file in out/make/squirrel.windows/x64/*.exe; do
        if [ -f "$file" ]; then
          echo "Uploading $file..."
          curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
               --upload-file "$file" \
               "${PACKAGE_REGISTRY_URL}/releases/${VERSION}/$(basename $file)"
        fi
      done

      # Create latest.yml for auto-updater
      echo "Creating latest.yml for auto-updater..."
      cat > latest.yml << EOF
      version: ${VERSION}
      path: cline-gui-${VERSION}-setup.exe
      sha512: $(sha512sum out/make/squirrel.windows/x64/*.exe 2>/dev/null | cut -d' ' -f1 || echo "")
      releaseDate: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
      EOF

      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file latest.yml \
           "${PACKAGE_REGISTRY_URL}/releases/${VERSION}/latest.yml"

      echo "Packages published successfully!"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

# Create GitLab Release
create:release:
  stage: release
  needs:
    - job: publish:packages
  script:
    - |
      VERSION=${CI_COMMIT_TAG#v}
      echo "Creating release for version ${VERSION}"

      # Use curl to create release via GitLab API
      curl --header "PRIVATE-TOKEN: ${CI_JOB_TOKEN}" \
           --header "Content-Type: application/json" \
           --data "{
             \"tag_name\": \"${CI_COMMIT_TAG}\",
             \"name\": \"Cline GUI v${VERSION}\",
             \"description\": \"## Cline GUI v${VERSION}\n\n### Downloads\n\n- **Linux (DEB)**: [cline-gui_${VERSION}_amd64.deb](${PACKAGE_REGISTRY_URL}/releases/${VERSION}/cline-gui_${VERSION}_amd64.deb)\n- **Linux (RPM)**: [cline-gui-${VERSION}.x86_64.rpm](${PACKAGE_REGISTRY_URL}/releases/${VERSION}/cline-gui-${VERSION}.x86_64.rpm)\n- **Windows**: [Cline-GUI-${VERSION}-Setup.exe](${PACKAGE_REGISTRY_URL}/releases/${VERSION}/Cline-GUI-${VERSION}-Setup.exe)\n\n---\n\n*Built automatically by GitLab CI/CD*\"
           }" \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
