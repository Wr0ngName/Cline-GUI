# GitLab CI/CD Pipeline for Cline GUI
# Builds Electron app for Windows, macOS, and Linux
# Uses shell executor with docker run for containerized builds

stages:
  - test
  - build
  - release

variables:
  # Node.js version
  NODE_VERSION: "20"
  # Package registry for auto-updates
  PACKAGE_REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic"
  # Disable git clean during checkout - we handle cleanup ourselves after fixing permissions
  GIT_CLEAN_FLAGS: none

# Common cleanup template - fixes root-owned files from docker
# Uses docker to run chown as root (since host doesn't have passwordless sudo)
.docker_cleanup:
  before_script:
    # Fix permissions from any previous failed runs (using docker to get root)
    - docker run --rm -v "$CI_PROJECT_DIR:/app" alpine chown -R $(id -u):$(id -g) /app || true
    # Now clean up old files (git clean was disabled via GIT_CLEAN_FLAGS)
    - git clean -ffdx || true
  after_script:
    # Always fix permissions after job (even on failure)
    - docker run --rm -v "$CI_PROJECT_DIR:/app" alpine chown -R $(id -u):$(id -g) /app || true

# =============================================================================
# TEST STAGE
# =============================================================================

lint:
  stage: test
  tags:
    - shell
  extends: .docker_cleanup
  script:
    - |
      docker run --rm \
        -v "$CI_PROJECT_DIR:/app" \
        -w /app \
        node:${NODE_VERSION} \
        sh -c "npm ci --prefer-offline && npm run lint"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

test:
  stage: test
  tags:
    - shell
  extends: .docker_cleanup
  script:
    - |
      docker run --rm \
        -v "$CI_PROJECT_DIR:/app" \
        -w /app \
        node:${NODE_VERSION} \
        sh -c "npm ci --prefer-offline && npm run test"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

typecheck:
  stage: test
  tags:
    - shell
  extends: .docker_cleanup
  script:
    - |
      docker run --rm \
        -v "$CI_PROJECT_DIR:/app" \
        -w /app \
        node:${NODE_VERSION} \
        sh -c "npm ci --prefer-offline && npm run typecheck"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
  allow_failure: true  # Allow failure until all type issues are resolved

# =============================================================================
# BUILD STAGE
# =============================================================================

# Linux build template
.build_linux:
  stage: build
  tags:
    - shell
  extends: .docker_cleanup
  script:
    - |
      docker run --rm \
        -v "$CI_PROJECT_DIR:/app" \
        -w /app \
        electronuserland/builder:20 \
        bash -c "apt-get update && apt-get install -y dpkg fakeroot rpm && npm ci && npm run make -- --platform=linux"

# Linux build for tags (with artifacts for release)
build:linux:
  extends: .build_linux
  artifacts:
    name: "cline-gui-linux-${CI_COMMIT_REF_SLUG}"
    paths:
      - out/make/**/*.deb
      - out/make/**/*.rpm
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG

# Linux build for manual testing (no artifacts - too large for GitLab limit)
build:linux:manual:
  extends: .build_linux
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: true

# Windows build template
# Requires wine-mono for Squirrel.Windows target
# Install Node 20 via NodeSource (base image has Node 18)
.build_windows:
  stage: build
  tags:
    - shell
  extends: .docker_cleanup
  script:
    - |
      docker run --rm \
        -v "$CI_PROJECT_DIR:/app" \
        -w /app \
        electronuserland/builder:wine-mono \
        bash -c "curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && apt-get install -y nodejs && npm ci && npm run make -- --platform=win32"

# Windows build for tags (with artifacts for release)
build:windows:
  extends: .build_windows
  artifacts:
    name: "cline-gui-windows-${CI_COMMIT_REF_SLUG}"
    paths:
      - out/make/**/*.exe
      - out/make/**/*.nupkg
      - out/make/**/RELEASES
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG

# Windows build for manual testing (no artifacts - too large for GitLab limit)
build:windows:manual:
  extends: .build_windows
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: true

