# GitLab CI/CD Pipeline for Cline GUI
# Builds Electron app for Windows, macOS, and Linux
# Uses shell executor with docker run for containerized builds

stages:
  - test
  - build
  - release

variables:
  # Node.js version
  NODE_VERSION: "20"
  # Package registry for auto-updates
  PACKAGE_REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic"

# =============================================================================
# TEST STAGE
# =============================================================================

lint:
  stage: test
  script:
    - |
      docker run --rm \
        -v "$CI_PROJECT_DIR:/app" \
        -w /app \
        -u "$(id -u):$(id -g)" \
        node:${NODE_VERSION} \
        sh -c "npm ci --prefer-offline && npm run lint"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

test:
  stage: test
  script:
    - |
      docker run --rm \
        -v "$CI_PROJECT_DIR:/app" \
        -w /app \
        -u "$(id -u):$(id -g)" \
        node:${NODE_VERSION} \
        sh -c "npm ci --prefer-offline && npm run test"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

typecheck:
  stage: test
  script:
    - |
      docker run --rm \
        -v "$CI_PROJECT_DIR:/app" \
        -w /app \
        -u "$(id -u):$(id -g)" \
        node:${NODE_VERSION} \
        sh -c "npm ci --prefer-offline && npm run typecheck"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
  allow_failure: true  # Allow failure until all type issues are resolved

# =============================================================================
# BUILD STAGE
# =============================================================================

# Linux build (DEB, RPM)
build:linux:
  stage: build
  script:
    - |
      docker run --rm \
        -v "$CI_PROJECT_DIR:/app" \
        -w /app \
        -u "$(id -u):$(id -g)" \
        electronuserland/builder:18 \
        sh -c "npm ci && npm run make -- --platform=linux"
  artifacts:
    name: "cline-gui-linux-${CI_COMMIT_REF_SLUG}"
    paths:
      - out/make/**/*.deb
      - out/make/**/*.rpm
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: true

# Windows build (Squirrel installer)
# Requires wine-mono for Squirrel.Windows target
build:windows:
  stage: build
  script:
    - |
      docker run --rm \
        -v "$CI_PROJECT_DIR:/app" \
        -w /app \
        -u "$(id -u):$(id -g)" \
        electronuserland/builder:18-wine-mono \
        sh -c "npm ci && npm run make -- --platform=win32"
  artifacts:
    name: "cline-gui-windows-${CI_COMMIT_REF_SLUG}"
    paths:
      - out/make/**/*.exe
      - out/make/**/*.nupkg
      - out/make/**/RELEASES
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: true

