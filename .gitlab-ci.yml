# =============================================================================
# RELEASE STAGE
# =============================================================================

# Upload artifacts to GitLab Package Registry for auto-updates
publish:packages:
  stage: release
  tags:
    - shell
  needs:
    - job: build:linux
      artifacts: true
    - job: build:windows
      artifacts: true
  script:
    - |
      # Get version from tag
      VERSION=${CI_COMMIT_TAG#v}

      echo "Publishing version ${VERSION} to package registry..."

      # Upload Linux DEB
      for file in out/make/deb/x64/*.deb; do
        if [ -f "$file" ]; then
          echo "Uploading $file..."
          curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
               --upload-file "$file" \
               "${PACKAGE_REGISTRY_URL}/releases/${VERSION}/$(basename $file)"
        fi
      done

      # Upload Linux RPM
      for file in out/make/rpm/x64/*.rpm; do
        if [ -f "$file" ]; then
          echo "Uploading $file..."
          curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
               --upload-file "$file" \
               "${PACKAGE_REGISTRY_URL}/releases/${VERSION}/$(basename $file)"
        fi
      done

      # Upload Windows installer (replace spaces in filename with dashes for URL)
      for file in out/make/squirrel.windows/x64/*.exe; do
        if [ -f "$file" ]; then
          FILENAME=$(basename "$file" | tr ' ' '-')
          echo "Uploading $file as ${FILENAME}..."
          curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
               --upload-file "$file" \
               "${PACKAGE_REGISTRY_URL}/releases/${VERSION}/${FILENAME}"
        fi
      done

      # Create latest.yml for auto-updater
      echo "Creating latest.yml for auto-updater..."
      WIN_EXE=$(ls out/make/squirrel.windows/x64/*.exe 2>/dev/null | head -1)
      WIN_FILENAME=$(basename "$WIN_EXE" | tr ' ' '-')
      cat > latest.yml << EOF
      version: ${VERSION}
      path: ${WIN_FILENAME}
      sha512: $(sha512sum "$WIN_EXE" 2>/dev/null | cut -d' ' -f1 || echo "")
      releaseDate: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
      EOF

      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file latest.yml \
           "${PACKAGE_REGISTRY_URL}/releases/${VERSION}/latest.yml"

      echo "Packages published successfully!"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

# Create GitLab Release using release-cli
create:release:
  stage: release
  tags:
    - shell
  needs:
    - job: publish:packages
  script:
    - |
      VERSION=${CI_COMMIT_TAG#v}
      TAG=${CI_COMMIT_TAG}
      PKG_URL=${PACKAGE_REGISTRY_URL}
      echo "Creating release for ${TAG}"

      # Create description file (on host, will mount into container)
      cat > /tmp/release_description.md << DESCEOF
      ## Cline GUI ${TAG}

      ### Downloads

      - **Linux (DEB)**: [cline-gui_${VERSION}_amd64.deb](${PKG_URL}/releases/${VERSION}/cline-gui_${VERSION}_amd64.deb)
      - **Linux (RPM)**: [cline-gui-${VERSION}.x86_64.rpm](${PKG_URL}/releases/${VERSION}/cline-gui-${VERSION}.x86_64.rpm)
      - **Windows**: [Cline-GUI-${VERSION}-Setup.exe](${PKG_URL}/releases/${VERSION}/Cline-GUI-${VERSION}-Setup.exe) *(filename may vary)*

      ---
      *Built automatically by GitLab CI/CD*
      DESCEOF

      docker run --rm \
        -e CI_JOB_TOKEN \
        -e CI_SERVER_URL \
        -e CI_PROJECT_ID \
        -v /tmp/release_description.md:/work/description.md:ro \
        -w /work \
        registry.gitlab.com/gitlab-org/release-cli:latest release-cli create \
          --name "Cline GUI ${TAG}" \
          --tag-name "${TAG}" \
          --description description.md
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
